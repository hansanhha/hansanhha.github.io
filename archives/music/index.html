<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노량진 수산시장</title>
    <style>
        #status-box {
            display: flex;
            width: fit-content;
        }

        .player-box {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: fit-content;
        }

        .operation-btn {
            margin-left: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status-box"></div>
    <div class="player-box">
        <div class="operation-btn" onclick="play('./data/the_weeknd_after_hours.mp3', 'the weeknd - after hours')">the weeknd - after hours.mp3</div>
        <div class="operation-btn" onclick="play('./data/emotional_oranges_sundays.mp3', 'emotional oranges - sundays')">emotional oranges - sundays.mp3</div>
        <div class="operation-btn" onclick="play('./data/local_natives_april.mp3', 'local natives - april')">local natives - april.mp3</div>
        <div class="operation-btn" onclick="play('./data/lauv_reforget.mp3', 'lauv - reforget')">lauv - reforget.mp3</div>
    </div>

    <script>
        let currentMusic;
        let isPaused = false;
        const statusBox = document.getElementById("status-box");

        const play = (source, title) => {
            if (currentMusic != null) {
                if (currentMusic.src === source) {
                    togglePlay(title, true);
                    return;
                }

                currentMusic.src = source;
                currentMusic.load();
                currentMusic.play();

                statusBox.firstChild.textContent = title + ' (playing)';
                statusBox.lastChild.remove();
                const operationBox = document.createElement('div');
                operationBox.textContent = ' pause';
                operationBox.className = 'operation-btn';
                operationBox.addEventListener('click', () => {
                    togglePlay(title);
                });
                statusBox.appendChild(operationBox);
            } else {
                currentMusic = new Audio(source);
                currentMusic.volume = 0.5;
                currentMusic.loop = false;
                currentMusic.play();

                const titleBox = document.createElement('span');
                const operationBox = document.createElement('div');
                titleBox.textContent = title + ' (playing)';
                operationBox.textContent = ' pause';
                operationBox.className = 'operation-btn';
                operationBox.addEventListener('click', () => {
                    togglePlay(title);
                });

                statusBox.style.borderBottom = "1px solid black";
                statusBox.appendChild(titleBox);
                statusBox.appendChild(operationBox);
            }
        }

        const togglePlay = (title, forcePause) => {
            if (currentMusic != null) {
                if (!isPaused || forcePause) {
                    currentMusic.pause();
                    statusBox.firstChild.textContent = title + ' (paused)';
                    statusBox.lastChild.textContent = ' resume';
                    isPaused = true;
                    return;
                }

                currentMusic.play();
                statusBox.firstChild.textContent = title + ' (playing)';
                statusBox.lastChild.textContent = ' pause';
                isPaused = false;
            }
        }
    </script>
</body>
</html>
