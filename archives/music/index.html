<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노량진 수산시장 플레이리스트</title>
    <style>
        #status-box {
            display: flex;
            width: fit-content;
            margin-top: 10px;
        }

        #playlist-box {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: fit-content;
        }

        .operation-btn {
            margin-left: 3px;
            cursor: pointer;
        }
    </style>
</head>
<header>
    <div style="display: flex;">
        <a href="/">home/</a>
        <a href="../">archives/</a>
        <a href="./">music/</a>
    </div>
</header>
<body>

    <div id="status-box"></div>
    <div id="playlist-box"></div>

    <script>
        let isPaused = false;

        const createAudio = () => {
            const audio = new Audio();
            audio.volume = 0.5;
            audio.loop = false;
            audio.addEventListener('ended', () => {
            });
            return audio;
        }

        const currentMusic = createAudio();
        const playlistSet = [];
        const currentPlaylist;
        const statusBox = document.getElementById("status-box");
        const playlistBox = document.getElementById("playlist-box");

        class Playlist {
            constructor(musicList, currentIndex) {
                this.musicList = musicList;
                this.currentIndex = currentIndex;
            }

            set add(music) {
                this.musicList.push(music);
            }
        }

        class Music {
            constructor(source, title) {
                this.source = source;
                this.title = title;
            }
        }

        const playlistSetup = async () => {

            const createPlaylist = (playlistInfo) => {
                const musicList = playlistInfo.map(info => {
                    const split = info.split('-');
                    const artist = split[0].replace('_', ' ');
                    const title = split[1].replace('_', ' ');

                    return new Music(info + 'mp3', artist + ' - ' + title);
                });

                return new Playlist(musicList, 0);
            }

            const addMusicHtmlElementInPlaylistBox = (music) => {
                const musicDiv = document.createElement('div');
                musicDiv.className = 'operation-btn';
                musicDiv.textContent = music.title + 'mp3';
                musicDiv.addEventListener('click', () => {
                    play(music);
                })
                playlistBox.appendChild(musicDiv);
            }

            const defaultPlaylistSetup = async () => {
                await fetch("https://hansanhha.github.io/archives/music/data/playlist.json")
                    .then(response => response.json())
                    .then(data => {
                        const defaultPlaylistInfo = data.default;
                        const defaultPlaylist = createPlaylist(defaultPlaylistInfo);
                        playlistSet.push(defaultPlaylist);
                        defaultPlaylist.musicList.forEach((music) => addMusicHtmlElementInPlaylistBox(music));
                    });
            }

            await defaultPlaylistSetup();
        }

        document.addEventListener('DOMContentLoaded', await playlistSetup);

        const play = (music) => {

            const updateStatus = () => {
                const operationBox = document.createElement('div');
                operationBox.textContent = ' pause';
                operationBox.className = 'operation-btn';
                operationBox.addEventListener('click', () => {
                    togglePlay(music);
                });

                if (!statusBox.hasChildNodes()) {
                    const titleBox = document.createElement('span');
                    titleBox.textContent = music.title + ' (playing)';

                    statusBox.style.borderBottom = "1px solid black";

                    statusBox.appendChild(titleBox);
                    statusBox.appendChild(operationBox);
                } else {
                    statusBox.firstChild.textContent = music.title + ' (playing)';
                    statusBox.lastChild.remove();
                    statusBox.appendChild(operationBox);
                }

            }

            if (currentMusic.src === 'https://hansanhha.github.io/archives/music/data/' + music.source) {
                togglePlay(music);
                return;
            }

            currentMusic.src = './data/' + music.source;
            currentMusic.load();
            currentMusic.play();

            updateStatus();
        }

        const togglePlay = (music) => {
            if (currentMusic != null) {
                if (!isPaused) {
                    currentMusic.pause();
                    statusBox.firstChild.textContent = music.title + ' (paused)';
                    statusBox.lastChild.textContent = ' resume';
                    isPaused = true;
                    return;
                }

                currentMusic.play();
                statusBox.firstChild.textContent = music.title + ' (playing)';
                statusBox.lastChild.textContent = ' pause';
                isPaused = false;
            }
        }
    </script>
</body>
</html>
