<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노량진 수산시장 플레이리스트</title>
    <style>
        #status-box {
            display: flex;
            width: fit-content;
            margin-top: 10px;
        }

        #playlist-box {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100vw;
        }

        .operation-btn {
            margin-left: 3px;
            cursor: pointer;
            width: fit-content;
        }
    </style>
</head>
<header>
    <div style="display: flex;">
        <a href="/">home/</a>
        <a href="../">archives/</a>
        <a href="./">music/</a>
    </div>
</header>
<body>

    <div id="status-box"></div>
    <div id="playlist-box"></div>

    <script>
        const createAudio = () => {
            const audio = new Audio();
            audio.volume = 0.5;
            audio.loop = false;
            audio.addEventListener('ended', () => {
            });
            return audio;
        }

        const currentMusic = createAudio();
        let currentPlaylist;
        let playIndex;
        const playlistSet = [];
        const statusBox = document.getElementById("status-box");
        const playlistBox = document.getElementById("playlist-box");

        class Playlist {
            constructor(musicList) {
                this.musicList = musicList;
                this.startIndex = 0;
            }

            indexOf(music) {
                for (let i = 0; i < this.musicList.length; i++) {
                    if (this.musicList[i].title === music.title) {
                        return i;
                    }
                }
                return -1;
            }

            nextPlay() {
                if (playIndex  === currentPlaylist.length - 1) {
                    currentMusic.removeEventListener('ended', this.nextPlay);
                    this.updateHtmlToEndPlaylistStatus();
                    return;
                }

                const nextMusic = currentPlaylist[++playIndex];
                nextMusic.play();
            }

            play(music) {
                if (music.isPaused()) {
                    music.resume();
                    return;
                }

                if (music.isPlaying()) {
                    music.pause();
                    return;
                }

                this.startIndex = this.indexOf(music);
                playIndex = 0;

                if (this.startIndex !== -1) {
                    const entirePlaylist = [];

                    for (let i = this.startIndex; i < this.musicList.length; i++) {
                        entirePlaylist.push(this.musicList[i]);
                    }

                    for (let i = 0; i < this.startIndex; i++) {
                        entirePlaylist.push(this.musicList[i]);
                    }

                    currentPlaylist = entirePlaylist;
                }

                currentMusic.removeAttribute('src');
                currentMusic.addEventListener('ended', this.nextPlay);

                music.play();
            }


            updateHtmlToEndPlaylistStatus() {
                statusBox.firstChild.textContent = 'end playlist';
                statusBox.lastChild.textContent = '';
            }
        }

        class Music {
            constructor(source, title) {
                this.source = source;
                this.title = title;
                this.paused = false;
            }

            isPlaying() {
                return currentMusic.src === 'https://hansanhha.github.io/archives/music/data/' + this.source;
            }

            isPaused() {
                return this.paused;
            }

            play() {
                if  (this.isPaused()) {
                    this.resume();
                    return;
                }

                if (this.isPlaying()) {
                    this.pause();
                    return;
                }

                currentMusic.src = './data/' + this.source;
                currentMusic.load();
                currentMusic.play();

                if (!statusBox.hasChildNodes()) {
                    this.createStatusElement();
                }

                this.updateHtmlToPlayStatus();
            }

            resume() {
                if (this.isPlaying()) {
                    currentMusic.play();
                    this.updateHtmlToPlayStatus();
                    this.paused = false;
                }
            }

            pause() {
                if (this.isPlaying()) {
                    currentMusic.pause();
                    this.updateHtmlToPausedStatus();
                    this.paused = true;
                }
            }

            updateHtmlToPlayStatus() {
                statusBox.firstChild.textContent = this.title + ' (playing) ';
                statusBox.lastChild.textContent = ' pause';
            }

            updateHtmlToPausedStatus() {
                statusBox.firstChild.textContent = this.title + ' (paused) ';
                statusBox.lastChild.textContent = ' resume';
            }

            createStatusElement() {
                const status = document.createElement('span');
                const utilBtn = document.createElement('div');
                utilBtn.className = 'operation-btn';

                utilBtn.addEventListener('click', () => {
                    if (this.isPaused()) {
                        this.resume();
                    }
                    else if (this.isPlaying()) {
                        this.pause();
                    } else {
                        this.play();
                    }
                });

                statusBox.appendChild(status);
                statusBox.appendChild(utilBtn);
            }
        }

        const playlistSetup = async () => {

            const createPlaylist = (playlistInfo) => {
                const musicList = playlistInfo.map(info => {
                    const split = info.split('-');
                    const artist = split[0].replace('_', ' ');
                    const title = split[1].replace('_', ' ');

                    return new Music(info + '.mp3', artist + ' - ' + title);
                });

                const playlist = new Playlist(musicList);
                playlistSet.push(playlist);
                return playlist;
            }

            const createPlaylistElement = (playlist) => {
                playlist.musicList.forEach(music => {
                    const musicDiv = document.createElement('div');
                    musicDiv.className = 'operation-btn';
                    musicDiv.textContent = music.title + '.mp3';
                    musicDiv.addEventListener('click', () => {
                        playlist.play(music);
                    });

                    playlistBox.appendChild(musicDiv);
                });
            }

            const defaultPlaylistSetup = async () => {
                await fetch("https://hansanhha.github.io/archives/music/data/playlist.json")
                    .then(response => response.json())
                    .then(data => {
                        const defaultPlaylistInfo = data.default;
                        const defaultPlaylist = createPlaylist(defaultPlaylistInfo);
                        createPlaylistElement(defaultPlaylist);
                    });
            }

            await defaultPlaylistSetup();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await playlistSetup();
        });
    </script>
</body>
</html>
