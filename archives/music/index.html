<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노량진 수산시장 플레이리스트</title>
    <style>
        #status-box {
            display: flex;
            flex-direction: column;
            width: fit-content;
            margin-top: 10px;
        }

        .util-box {
            display: flex;
            margin-top: 3px;
        }

        #playlist-box {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100vw;
        }

        .operation-btn {
            margin-left: 3px;
            cursor: pointer;
            width: fit-content;
        }
    </style>
</head>
<header>
    <div style="display: flex;">
        <a href="/">home/</a>
        <a href="../">archives/</a>
        <a href="./">music/</a>
    </div>
</header>
<body>

    <div id="status-box"></div>
    <div id="playlist-box"></div>

    <script>
        const createAudio = () => {
            const audio = new Audio();
            audio.volume = 0.5;
            audio.loop = false;
            return audio;
        }

        const musicAudio = createAudio();
        let currentPlaylist;
        const playlistSet = [];
        const statusBox = document.getElementById("status-box");
        const playlistBox = document.getElementById("playlist-box");

        class Playlist {
            currentMusic;
            loop;
            startIndex;
            playIndex;

            constructor(musicList) {
                this.musicList = musicList;
            }

            indexOf(music) {
                for (let i = 0; i < this.musicList.length; i++) {
                    if (this.musicList[i].title === music.title) {
                        return i;
                    }
                }
                return -1;
            }

            updateHtmlToEndPlaylistStatus() {
                statusBox.firstChild.textContent = 'end playlist';
                statusBox.lastChild.textContent = '';
            }

            prevPlay() {
                if (!this.loop && this.playIndex -1 < 0) {
                    const prevMusic = this.musicList[0];
                    prevMusic.play();
                }

                let prevMusic;

                if (this.currentMusic.isLoop()) {
                    prevMusic = this.currentMusic;
                }
                else if (this.loop && this.playIndex - 1 < 0) {
                    prevMusic = this.musicList[this.playIndex = this.musicList.length - 1];
                } else {
                    prevMusic = this.musicList[--this.playIndex];
                }

                prevMusic.play();
            }

            nextPlay() {
                if (!this.loop && this.playIndex  === this.musicList.length - 1) {
                    musicAudio.removeEventListener('ended', this.nextPlay);
                    this.updateHtmlToEndPlaylistStatus();
                    return;
                }

                let nextMusic;

                if (this.currentMusic.isLoop()) {
                    nextMusic = this.currentMusic;
                }
                else if (this.loop && this.playIndex + 1 > this.musicList.length - 1) {
                    nextMusic = this.musicList[this.playIndex = 0];
                } else {
                    nextMusic = this.musicList[++this.playIndex];
                }

                nextMusic.play();
            }

            createStatusElementIfNone() {
                if (statusBox.hasChildNodes()) {
                    return;
                }

                const status = document.createElement('span');
                const utilBox = document.createElement('div');
                const prevPlayBtn  = document.createElement('div');
                const nextPlayBtn  = document.createElement('div');
                const playControlBtn = document.createElement('div');
                const loopPlayBtn = document.createElement('div');

                status.style.borderBottom = '1px solid black';
                utilBox.className = 'util-box';
                prevPlayBtn.className = 'operation-btn';
                nextPlayBtn.className = 'operation-btn';
                playControlBtn.className = 'operation-btn';
                loopPlayBtn.className = 'operation-btn';

                prevPlayBtn.textContent = 'prev';
                nextPlayBtn.textContent = 'next';
                loopPlayBtn.textContent = 'loop';

                prevPlayBtn.addEventListener('click', () => {
                    this.prevPlay();
                });

                nextPlayBtn.addEventListener('click', () => {
                    this.nextPlay();
                });

                playControlBtn.addEventListener('click', () => {
                    if (this.currentMusic.isPaused()) {
                        this.currentMusic.resume();
                    } else if (this.currentMusic.isPlaying()) {
                        this.currentMusic.pause();
                    } else {
                    }
                });

                loopPlayBtn.addEventListener('click', () => {
                    if (!this.currentMusic.isLoop() && !this.loop) {
                        this.currentMusic.loop();
                        loopPlayBtn.textContent = 'loop(this)';
                    } else if (musicAudio.isLoop() && !this.loop) {
                        this.currentMusic.unLoop();
                        this.loop = true;
                        loopPlayBtn.textContent = 'loop(playlist)';
                    } else {
                        this.loop = false;
                        loopPlayBtn.textContent = 'loop';
                    }
                });

                statusBox.appendChild(status);
                utilBox.appendChild(prevPlayBtn);
                utilBox.appendChild(playControlBtn);
                utilBox.appendChild(nextPlayBtn);
                utilBox.appendChild(loopPlayBtn);
                status.appendChild(utilBox);
            }

            play(music) {
                if (music.isPaused()) {
                    music.resume();
                    return;
                }

                if (music.isPlaying()) {
                    music.pause();
                    return;
                }

                this.startIndex = this.indexOf(music);

                if (this.startIndex === -1) {
                    return;
                }

                this.createStatusElementIfNone();

                const entirePlaylist = [];
                this.playIndex = 0;

                for (let i = this.startIndex; i < this.musicList.length; i++) {
                    entirePlaylist.push(this.musicList[i]);
                }

                for (let i = 0; i < this.startIndex; i++) {
                    entirePlaylist.push(this.musicList[i]);
                }

                currentPlaylist = entirePlaylist;

                musicAudio.removeAttribute('src');
                musicAudio.addEventListener('ended', this.nextPlay);

                this.currentMusic = music;
                this.currentMusic.play();
            }
        }

        class Music {
            constructor(source, title) {
                this.source = source;
                this.title = title;
                this.paused = false;
                this.loop = false;
            }

            isPlaying() {
                return musicAudio.src === 'https://hansanhha.github.io/archives/music/data/' + this.source;
            }

            isPaused() {
                return this.paused;
            }

            isLoop() {
                return this.loop;
            }

            loop() {
                this.loop = true;
                musicAudio.loop = true;
            }

            unLoop() {
                this.loop = false;
                musicAudio.loop = false;
            }

            play() {
                if  (this.isPaused()) {
                    this.resume();
                    return;
                }

                if (this.isPlaying()) {
                    this.pause();
                    return;
                }

                musicAudio.src = './data/' + this.source;
                musicAudio.load();
                musicAudio.play();

                if (!statusBox.hasChildNodes()) {
                    this.createStatusElement();
                }

                this.updateHtmlToPlayStatus();
            }

            resume() {
                if (this.isPlaying()) {
                    musicAudio.play();
                    this.updateHtmlToPlayStatus();
                    this.paused = false;
                }
            }

            pause() {
                if (this.isPlaying()) {
                    musicAudio.pause();
                    this.updateHtmlToPausedStatus();
                    this.paused = true;
                }
            }

            updateHtmlToPlayStatus() {
                statusBox.firstChild.textContent = this.title + ' (playing) ';
                statusBox.lastChild.textContent = ' pause';
            }

            updateHtmlToPausedStatus() {
                statusBox.firstChild.textContent = this.title + ' (paused) ';
                statusBox.lastChild.textContent = ' resume';
            }

            createStatusElement() {
                const status = document.createElement('span');
                const utilBtn = document.createElement('div');
                utilBtn.className = 'operation-btn';

                utilBtn.addEventListener('click', () => {
                    if (this.isPaused()) {
                        this.resume();
                    } else if (this.isPlaying()) {
                        this.pause();
                    } else {
                        this.play();
                    }
                });

                statusBox.appendChild(status);
                statusBox.appendChild(utilBtn);
            }
        }

        const playlistSetup = async () => {

            const createPlaylist = (playlistInfo) => {
                const musicList = playlistInfo.map(info => {
                    const split = info.split('-');
                    const artist = split[0].replace('_', ' ');
                    const title = split[1].replace('_', ' ');

                    return new Music(info + '.mp3', artist + ' - ' + title);
                });

                const playlist = new Playlist(musicList);
                playlistSet.push(playlist);
                return playlist;
            }

            const createPlaylistElement = (playlist) => {
                playlist.musicList.forEach(music => {
                    const musicDiv = document.createElement('div');
                    musicDiv.className = 'operation-btn';
                    musicDiv.textContent = music.title + '.mp3';
                    musicDiv.addEventListener('click', () => {
                        playlist.play(music);
                    });

                    playlistBox.appendChild(musicDiv);
                });
            }

            const defaultPlaylistSetup = async () => {
                await fetch("https://hansanhha.github.io/archives/music/data/playlist.json")
                    .then(response => response.json())
                    .then(data => {
                        const defaultPlaylistInfo = data.default;
                        const defaultPlaylist = createPlaylist(defaultPlaylistInfo);
                        createPlaylistElement(defaultPlaylist);
                    });
            }

            await defaultPlaylistSetup();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await playlistSetup();
        });
    </script>
</body>
</html>
